<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>吴BTI</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<style>
    @media (pointer: fine) {
        * { cursor: none !important; }
    }

    body {
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        margin: 0;
        padding: 0;
        height: 100vh;
        background-color: #1f1e33;
        background-image: 
            radial-gradient(circle at 10% 20%, rgba(216, 180, 254, 0.05), transparent 40%),
            radial-gradient(circle at 90% 80%, rgba(253, 230, 138, 0.04), transparent 40%);
        color: #e2e8f0;
        display: flex;
        justify-content: center;
        align-items: center;
        overflow: hidden;
        position: relative;
        transition: background-image 0.5s ease-out;
    }

    body.glitch-active {
        animation: glitch-anim 0.2s linear infinite;
    }
    @keyframes glitch-anim {
        0% { filter: hue-rotate(0deg) blur(0px); transform: translate(0, 0) skew(0deg); }
        20% { filter: hue-rotate(45deg) blur(1px); transform: translate(-2px, 1px) skew(-1deg); }
        40% { filter: hue-rotate(-45deg) blur(0px); transform: translate(2px, -1px) skew(1deg); }
        60% { filter: hue-rotate(90deg) blur(2px); transform: translate(-1px, 2px) skew(-2deg); }
        80% { filter: hue-rotate(-90deg) blur(1px); transform: translate(1px, -2px) skew(2deg); }
        100% { filter: hue-rotate(0deg) blur(0px); transform: translate(0, 0) skew(0deg); }
    }

    #floating-texts {
        position: fixed;
        top: 0; left: 0;
        width: 100%; height: 100%;
        pointer-events: none;
        z-index: 1;
        overflow: hidden;
    }
    .floating-text {
        position: absolute;
        bottom: -50px;
        color: rgba(226, 232, 240, 0.035);
        white-space: nowrap;
        font-family: 'Songti SC', 'SimSun', serif;
        letter-spacing: 3px;
        animation: float-up-text linear forwards;
    }
    @keyframes float-up-text {
        0% { transform: translateY(0); opacity: 0; }
        10% { opacity: 1; }
        80% { opacity: 1; }
        100% { transform: translateY(-110vh); opacity: 0; }
    }

    #custom-cursor {
        position: fixed;
        top: -50px; left: -50px;
        width: 18px; height: 18px;
        border: 1px solid rgba(165, 180, 252, 0.8);
        border-radius: 50%;
        transform: translate(-50%, -50%);
        pointer-events: none;
        z-index: 10000;
        display: flex; justify-content: center; align-items: center;
        transition: width 0.2s, height 0.2s, background 0.2s, border-color 0.2s;
    }
    #custom-cursor::after {
        content: '';
        width: 4px; height: 4px;
        background: #a5b4fc;
        border-radius: 50%;
        transition: transform 0.2s;
    }
    #custom-cursor.cursor-hover {
        width: 32px; height: 32px;
        background: rgba(165, 180, 252, 0.1);
        border-color: rgba(165, 180, 252, 0.4);
    }
    #custom-cursor.cursor-hover::after {
        transform: scale(0);
    }
    @media (hover: none) and (pointer: coarse) {
        #custom-cursor { display: none !important; }
    }

    #trail-canvas {
        position: fixed; top: 0; left: 0; width: 100%; height: 100%;
        pointer-events: none; z-index: 9998;
    }
    #fireworks-canvas {
        position: fixed; top: 0; left: 0; width: 100%; height: 100%;
        pointer-events: none; z-index: 9999;
    }

    #wbti-watermark {
        position: fixed;
        top: 50%; left: 50%;
        transform: translate(-50%, -50%);
        font-size: 30vw; font-weight: 900;
        color: rgba(255, 255, 255, 0.015);
        z-index: 0; pointer-events: none; user-select: none;
        letter-spacing: -1.5vw;
        animation: float 8s ease-in-out infinite;
    }
    @keyframes float {
        0%, 100% { transform: translate(-50%, -50%) scale(1); }
        50% { transform: translate(-50%, -52%) scale(1.02); }
    }

    .glass-panel {
        background: rgba(31, 30, 51, 0.85);
        backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
        border: 1px solid rgba(148, 163, 184, 0.15);
        border-radius: 12px;
        padding: 40px;
        width: 85%; max-width: 600px;
        box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.6);
        text-align: center;
        position: relative; z-index: 10;
        max-height: 90vh; overflow-y: auto;
    }
    .glass-panel::-webkit-scrollbar { width: 6px; }
    .glass-panel::-webkit-scrollbar-thumb { background: rgba(148, 163, 184, 0.1); border-radius: 3px; }
    .hidden { display: none !important; }

    .micro-en {
        font-size: 10px; color: #64748b; letter-spacing: 1.5px;
        text-transform: uppercase; font-family: monospace;
        margin-top: 4px; display: block;
    }

    #main-title { font-size: 48px; font-weight: 700; margin-bottom: 16px; color: #f8fafc; letter-spacing: 4px; }
    #sub-title { font-size: 16px; color: #94a3b8; line-height: 1.8; margin-bottom: 40px; }

    .progress-bar-container {
        width: 100%; height: 2px;
        background: rgba(255, 255, 255, 0.03);
        border-radius: 1px; margin-bottom: 25px; overflow: hidden;
    }
    .progress-bar {
        height: 100%; width: 0%;
        background: #a1a1aa; transition: width 0.3s ease;
    }

    .fade-in { animation: fadeIn 0.4s ease forwards; }
    @keyframes fadeIn {
        from { opacity: 0; transform: translateY(8px); }
        to { opacity: 1; transform: translateY(0); }
    }

    .typing-cursor {
        display: inline-block; width: 8px; height: 18px;
        background-color: #a1a1aa; vertical-align: middle;
        margin-left: 4px; animation: blink 1s step-end infinite;
    }
    @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0; } }

    .header-group { margin-bottom: 30px; text-align: left; }
    #question-text { font-size: 18px; line-height: 1.6; margin: 0; font-weight: 400; min-height: 56px; }

    .option-btn {
        display: block; width: 100%;
        padding: 14px 18px; margin: 10px 0;
        background: rgba(255, 255, 255, 0.03);
        border: 1px solid rgba(255, 255, 255, 0.1);
        border-radius: 8px; color: #cbd5e1;
        font-size: 15px; transition: background 0.2s, border-color 0.2s, color 0.2s;
        text-align: left;
    }
    .option-btn:hover {
        background: rgba(148, 163, 184, 0.08);
        border-color: rgba(148, 163, 184, 0.3); color: #f8fafc;
    }

    #processing-log {
        font-family: monospace; font-size: 14px;
        color: #e2e8f0; text-align: left; line-height: 2; margin-top: 20px;
    }

    #result-title { font-size: 24px; font-weight: 600; margin-bottom: 24px; color: #f8fafc; letter-spacing: 1px; }
    #result-desc { font-size: 15px; color: #94a3b8; margin-bottom: 30px; line-height: 1.8; text-align: justify; }
    
    .birthday-message {
        font-size: 22px; font-weight: 500; color: #fef3c7;
        letter-spacing: 4px; opacity: 0; transform: translateY(10px);
        transition: opacity 1.5s ease 1s, transform 1.5s ease 1s; margin-bottom: 20px;
    }
    .birthday-message.show { opacity: 1; transform: translateY(0); }
    
    #start-btn, #save-btn {
        display: inline-block; width: auto;
        padding: 12px 32px; background: rgba(76, 110, 245, 0.08); 
        border: 1px solid rgba(76, 110, 245, 0.3); border-radius: 20px;
        color: #a5b4fc; font-size: 16px;
        transition: all 0.2s; margin-top: 10px; text-align: center;
    }
    #start-btn:hover, #save-btn:hover {
        background: rgba(76, 110, 245, 0.15); border-color: rgba(76, 110, 245, 0.5);
    }
</style>
</head>
<body>

<div id="wbti-watermark">WBTI</div>
<div id="floating-texts"></div>

<canvas id="trail-canvas"></canvas>
<canvas id="fireworks-canvas"></canvas>

<div id="custom-cursor"></div>

<audio id="bgm-player" loop preload="auto">
    <source src="bgm.mp3" type="audio/mpeg">
</audio>

<div class="glass-panel" id="start-container">
    <h1 id="main-title">吴BTI</h1>
    <div id="sub-title">超越了MBTI一百年的新时代特色心理人格测试</div>
    <span class="micro-en" style="margin-bottom: 30px;">SYSTEM INITIALIZATION COMPLETE</span>
    <button id="start-btn" class="hover-target">开始鉴定</button>
</div>

<div class="glass-panel hidden" id="quiz-container">
    <div class="progress-bar-container">
        <div class="progress-bar" id="progress-bar"></div>
    </div>
    <div id="quiz-content">
        <div class="header-group">
            <h2 id="question-text"></h2>
            <span class="micro-en" id="question-micro">AWAITING USER INPUT...</span>
        </div>
        <div id="options-container" class="hidden"></div>
    </div>
</div>

<div class="glass-panel hidden" id="processing-container">
    <div style="font-size: 14px; color: #94a3b8; letter-spacing: 2px;">PROCESSING DATA...</div>
    <span class="micro-en">EXTRACTING CORE PARAMETERS</span>
    <div id="processing-log"></div>
</div>

<div class="glass-panel hidden" id="result-container">
    <div style="font-size: 12px; color: #4b5563; margin-bottom: 4px; letter-spacing: 2px;">ASSESSMENT COMPLETED</div>
    <span class="micro-en" style="margin-bottom: 20px; color: #334155;">FINAL MODEL GENERATED</span>
    <div id="result-title"></div>
    <div id="result-desc"></div>
    <div class="birthday-message" id="birthday-msg">祝你生日快乐</div>
    <button id="save-btn" class="hidden hover-target">
        保存结果卡片
        <span class="micro-en" style="color: rgba(165, 180, 252, 0.5); margin-top: 4px;">EXPORT ARCHIVE</span>
    </button>
</div>

<script>
    const questions = [
        { text: "1. 面对突发的困境或冲突，你的第一处理机制倾向于是：", options: [ { text: "引述既有的规则或先例来证明现状的不合理", effect: { d1: 1, d2: 1, d3: 1 } }, { text: "记录下这个时刻并在社交网络分享", effect: { d1: -1, d2: 1, d3: -1 } }, { text: "缩小关注范围，将注意力转移到个人的专注领域", effect: { d1: 1, d2: -1, d3: -1 } }, { text: "评估现有物理条件，接受现实并等待转机", effect: { d1: -1, d2: -1, d3: 1 } } ] },
        { text: "2. 在阅读日本新本格派推理小说时，你通常最欣赏的元素是：", options: [ { text: "核心诡计的物理可行性与参数的严密计算", effect: { d1: -1, d2: -1, d3: 1 } }, { text: "角色群体之间复杂的交际网络与互动", effect: { d1: -1, d2: 1, d3: -1 } }, { text: "对现存社会律法体系的挑战与逻辑重构", effect: { d1: 1, d2: 1, d3: 1 } }, { text: "凶手或侦探身上那种极其纯粹且孤独的执念", effect: { d1: 1, d2: -1, d3: -1 } } ] },
        { text: "3. 听到一首编曲复杂的摇滚乐，你的注意力最容易被什么吸引：", options: [ { text: "乐器演奏的具体质感，如拨片触弦的力度差异", effect: { d1: 1, d2: -1, d3: 1 } }, { text: "歌词中涉及的历史背景与文化隐喻", effect: { d1: 1, d2: 1, d3: 1 } }, { text: "这首歌是否适合分享到个人主页作为品味标签", effect: { d1: -1, d2: 1, d3: -1 } }, { text: "声音频率的分布特征与声学工程结构", effect: { d1: -1, d2: -1, d3: -1 } } ] },
        { text: "4. 如果由你来设定一个虚构的英雄，其力量核心会基于：", options: [ { text: "某种尚未普及但逻辑自洽的物理学理论", effect: { d1: -1, d2: -1, d3: 1 } }, { text: "依靠外观的社交吸引力和群众的关注度", effect: { d1: -1, d2: 1, d3: -1 } }, { text: "一种难以被大众理解的个人执念", effect: { d1: 1, d2: -1, d3: -1 } }, { text: "维护某套古典法律或秩序的意志体现", effect: { d1: 1, d2: 1, d3: 1 } } ] },
        { text: "5. 在资源管理类游戏中面临资源耗尽，你的做法是：", options: [ { text: "精确计算自然恢复的时间周期，耐心等待", effect: { d1: -1, d2: -1, d3: 1 } }, { text: "关掉游戏，去做其他高度专注的事情（如练琴）", effect: { d1: 1, d2: -1, d3: -1 } }, { text: "查阅游戏背后的世界观和历史设定文本", effect: { d1: 1, d2: 1, d3: 1 } }, { text: "去社交平台发布状态或查看其他玩家的动态", effect: { d1: -1, d2: 1, d3: -1 } } ] },
        { text: "6. 如果你预订了一件必须的物品，但物流提示延期，你会：", options: [ { text: "记录下预计到货的确切日期（如3月28日），不再挂念", effect: { d1: -1, d2: -1, d3: 1 } }, { text: "在社交软件上发布图文抱怨物流效率", effect: { d1: -1, d2: 1, d3: -1 } }, { text: "查阅相关条款，评估自身的权益界限", effect: { d1: 1, d2: 1, d3: 1 } }, { text: "将其视为一种日常等待，继续沉浸在个人的爱好中", effect: { d1: 1, d2: -1, d3: -1 } } ] },
        { text: "7. 在大学校园里，你最有可能保持的活动轨迹是：", options: [ { text: "一个人在特定的封闭角落反复练习某项技能", effect: { d1: 1, d2: -1, d3: 1 } }, { text: "在人流密集的区域或他人宿舍附近活动", effect: { d1: -1, d2: 1, d3: -1 } }, { text: "在特定区域翻阅厚重的文科或法学史料", effect: { d1: 1, d2: 1, d3: 1 } }, { text: "在实验室或图书馆查阅理工科客观文献", effect: { d1: -1, d2: -1, d3: -1 } } ] },
        { text: "8. 当他人对你的专业领域提出不准确的质疑时，你的反应是：", options: [ { text: "引经据典，用一套完整的理论驳倒对方", effect: { d1: 1, d2: 1, d3: 1 } }, { text: "认为对方缺乏基础常识，不作多余解释", effect: { d1: -1, d2: -1, d3: 1 } }, { text: "转移话题，以维持表面的社交互动", effect: { d1: -1, d2: 1, d3: -1 } }, { text: "认为他人无需理解，继续保持自己的偏好", effect: { d1: 1, d2: -1, d3: -1 } } ] },
        { text: "9. 如果让你主导一项创作，其核心题材更倾向于：", options: [ { text: "一部基于严密考究的双边关系史料", effect: { d1: 1, d2: 1, d3: 1 } }, { text: "一本注重客观事实与参数观测的说明书", effect: { d1: -1, d2: -1, d3: -1 } }, { text: "一首结构简单但极具个人情绪的器乐曲", effect: { d1: 1, d2: -1, d3: -1 } }, { text: "一份记录特定人群情感交集的社交图册", effect: { d1: -1, d2: 1, d3: 1 } } ] },
        { text: "10. 在人际交往中，你下意识呈现出的外在形象更接近：", options: [ { text: "活跃、经历丰富且乐于展示", effect: { d1: -1, d2: 1, d3: -1 } }, { text: "严谨、博学且具备规则感", effect: { d1: 1, d2: 1, d3: 1 } }, { text: "稳定、精确且情绪起伏较小", effect: { d1: -1, d2: -1, d3: 1 } }, { text: "专注、纯粹且具备某种特定执念", effect: { d1: 1, d2: -1, d3: -1 } } ] },
        { text: "11. 对于自己深爱的事物，你的态度倾向于是：", options: [ { text: "希望消除自身的主体性，完全化作该事物的一部分", effect: { d1: 1, d2: -1, d3: -1 } }, { text: "试图掌握其演变脉络，成为该领域的解释者", effect: { d1: 1, d2: 1, d3: 1 } }, { text: "保持观察者的距离，将其视为客观规律的体现", effect: { d1: -1, d2: -1, d3: -1 } }, { text: "将其作为自身社交价值的一部分进行展示", effect: { d1: -1, d2: 1, d3: -1 } } ] },
        { text: "12. 结束了一周的既定日程，周五晚上的你通常会：", options: [ { text: "寻找社交聚会或去其他区域进行试探性交往", effect: { d1: -1, d2: 1, d3: -1 } }, { text: "拿起熟悉的工具，进行机械性重复的练习", effect: { d1: 1, d2: -1, d3: 1 } }, { text: "核对时间表，确认各项事务的客观进度", effect: { d1: -1, d2: -1, d3: 1 } }, { text: "整理信息，构建自己理解中的逻辑脉络", effect: { d1: 1, d2: 1, d3: 1 } } ] },
        { text: "13. 你认为维持社会或系统运行的基础机制在于：", options: [ { text: "客观存在的物理常数与时间约束", effect: { d1: -1, d2: -1, d3: 1 } }, { text: "人类建立的繁复法条与历史共识", effect: { d1: 1, d2: 1, d3: 1 } }, { text: "个体之间不断交换的关注度与需求", effect: { d1: -1, d2: 1, d3: -1 } }, { text: "少数人内心坚持的微小执念", effect: { d1: 1, d2: -1, d3: -1 } } ] },
        { text: "14. 当心理压力达到临界值时，你倾向的缓解方式是：", options: [ { text: "增加在社交媒体上的曝光度与互动频率", effect: { d1: -1, d2: 1, d3: -1 } }, { text: "通过机械重复的局部动作（如弹拨）来放空意识", effect: { d1: 1, d2: -1, d3: -1 } }, { text: "输出长篇文字来阐明原委并占据逻辑高点", effect: { d1: 1, d2: 1, d3: 1 } }, { text: "强制降低情绪阈值，进入被动的等待状态", effect: { d1: -1, d2: -1, d3: -1 } } ] },
        { text: "15. 处于陌生的街区，最先捕捉你注意力的信息是：", options: [ { text: "过往行人的外貌特征与社交属性", effect: { d1: -1, d2: 1, d3: -1 } }, { text: "周边建筑的力学结构与空间布局", effect: { d1: -1, d2: -1, d3: 1 } }, { text: "街边标语、规章或广告牌上的文字逻辑", effect: { d1: 1, d2: 1, d3: 1 } }, { text: "某些不易察觉的特定环境音或背景音乐", effect: { d1: 1, d2: -1, d3: -1 } } ] },
        { text: "16. 如果必须用一个物件来指代你当前的心理特征，那会是：", options: [ { text: "一本受限于客观条件尚未发货的理科教材", effect: { d1: -1, d2: -1, d3: 1 } }, { text: "一张强调面部特征并经过修饰的个人照片", effect: { d1: -1, d2: 1, d3: -1 } }, { text: "一份被反复批注并修改过体系的外文文本", effect: { d1: 1, d2: 1, d3: 1 } }, { text: "一枚磨损严重但依然保持锐度的接触媒介", effect: { d1: 1, d2: -1, d3: -1 } } ] },
        { text: "17. 参与群体讨论时，你的行为模式倾向于：", options: [ { text: "致力于重申规则或纠正他人概念上的偏差", effect: { d1: 1, d2: 1, d3: 1 } }, { text: "仅在涉及具体数据或事实时进行客观纠正", effect: { d1: -1, d2: -1, d3: -1 } }, { text: "极少发言，除非话题直接触及你的核心兴趣", effect: { d1: 1, d2: -1, d3: 1 } }, { text: "活跃气氛，并将话题焦点转移到自己身上", effect: { d1: -1, d2: 1, d3: -1 } } ] },
        { text: "18. 设想未来的发展路径，你目前的驱动力在于希望：", options: [ { text: "按部就班地完成预定计划，获取确定的结果", effect: { d1: -1, d2: -1, d3: 1 } }, { text: "拓宽交际圈，获得更多的社交认证与反馈", effect: { d1: -1, d2: 1, d3: -1 } }, { text: "在某个特定的文科或秩序领域建立话语权", effect: { d1: 1, d2: 1, d3: 1 } }, { text: "保持现状的纯粹性，不被外界干扰偏好", effect: { d1: 1, d2: -1, d3: -1 } } ] },

    document.addEventListener('mousemove', (e) => {
        mouseX = e.clientX;
        mouseY = e.clientY;
        customCursor.style.left = mouseX + 'px';
        customCursor.style.top = mouseY + 'px';

        if(window.matchMedia("(pointer: fine)").matches) {
            trails.push({ x: mouseX, y: mouseY, life: 1, char: Math.random() > 0.5 ? '0' : '1' });
        }

        const xPercent = (mouseX / window.innerWidth) * 100;
        const yPercent = (mouseY / window.innerHeight) * 100;
        document.body.style.backgroundImage = `
            radial-gradient(circle at ${xPercent}% ${yPercent}%, ${envColor1}, transparent 40%),
            radial-gradient(circle at ${100 - xPercent}% ${100 - yPercent}%, ${envColor2}, transparent 40%)
        `;
    });

    function animateTrail() {
        tCtx.clearRect(0, 0, trailCanvas.width, trailCanvas.height);
        tCtx.font = "12px monospace";
        for (let i = trails.length - 1; i >= 0; i--) {
            let p = trails[i];
            p.life -= 0.04; p.y += 0.5; 
            tCtx.fillStyle = `rgba(165, 180, 252, ${p.life * 0.5})`;
            tCtx.fillText(p.char, p.x, p.y);
            if (p.life <= 0) trails.splice(i, 1);
        }
        requestAnimationFrame(animateTrail);
    }
    animateTrail();

    function updateEnvironmentLight() {
        let limit = currentQuestionIndex || 1;
        let r1_ratio = Math.max(-1, Math.min(1, scoreDim1 / limit));
        let r2_ratio = Math.max(-1, Math.min(1, scoreDim2 / limit));
        let baseR1 = 216 + (r1_ratio * 30);
        let baseG1 = 180 - (r2_ratio * 40);
        let baseB1 = 254 - (Math.abs(r1_ratio) * 40);
        let baseR2 = 253 - (Math.abs(r2_ratio) * 50);
        let baseG2 = 230 + (r1_ratio * 25);
        let baseB2 = 138 + (r2_ratio * 50);
        envColor1 = `rgba(${Math.floor(baseR1)}, ${Math.floor(baseG1)}, ${Math.floor(baseB1)}, 0.06)`;
        envColor2 = `rgba(${Math.floor(baseR2)}, ${Math.floor(baseG2)}, ${Math.floor(baseB2)}, 0.05)`;
    }

        bgmPlayer.play().catch(e => console.log("音乐播放受阻:", e));
        customCursor.classList.remove('cursor-hover');
        startContainer.classList.add('hidden');
        quizContainer.classList.remove('hidden');
        loadQuestion();
    });

    function typeWriter(text, element, speed, callback) {
        clearInterval(typeWriterInterval);
        element.innerHTML = "";
        isTyping = true;
        let i = 0;
        const textSpan = document.createElement("span");
        const cursorSpan = document.createElement("span");
        cursorSpan.className = "typing-cursor";
        element.appendChild(textSpan);
        element.appendChild(cursorSpan);
        typeWriterInterval = setInterval(() => {
            if (i < text.length) {
                textSpan.innerHTML += text.charAt(i);
                i++;
            } else {
                clearInterval(typeWriterInterval);
                isTyping = false;
                if (callback) callback();
            }
        }, speed);
    }

    function loadQuestion() {
        const currentQuestion = questions[currentQuestionIndex];
        const progressPercent = (currentQuestionIndex / questions.length) * 100;
        progressBar.style.width = progressPercent + "%";
        optionsContainer.classList.add("hidden");
        optionsContainer.innerHTML = "";
        currentQuestion.options.forEach(option => {
            const button = document.createElement("button");
            button.innerText = option.text;
            button.classList.add("option-btn");
            button.onclick = () => {
                if(!isTyping) {
                    triggerHaptic();
                    customCursor.classList.remove('cursor-hover');
                    selectOption(option.effect);
                }
            };
            optionsContainer.appendChild(button);
        });
        document.getElementById("question-micro").innerText = `AWAITING USER INPUT... [SEQ: ${(currentQuestionIndex + 1).toString().padStart(2, '0')}]`;
        typeWriter(currentQuestion.text, questionTextElement, 20, () => {
            optionsContainer.classList.remove("hidden");
            optionsContainer.classList.add("fade-in");
            bindCursorHover(); 
        });
    }

    function selectOption(effect) {
        scoreDim1 += effect.d1;
        scoreDim2 += effect.d2;
        scoreDim3 += effect.d3;
        currentQuestionIndex++;
        updateEnvironmentLight();
        if (currentQuestionIndex < questions.length) {
            loadQuestion();
        } else {
            progressBar.style.width = "100%";
            setTimeout(showProcessing, 400); 
        }
    }

    function showProcessing() {
        document.body.classList.add("glitch-active"); 
        setTimeout(() => {
            document.body.classList.remove("glitch-active");
            quizContainer.classList.add("hidden");
            processingContainer.classList.remove("hidden");
            const logs = ["> 提取行为决策链...", "> 解析环境交互参数...", "> 注入环境光谱色彩值...", "> 比对维度特征数据...", "> 生成最终人格模型...", "> COMPLETED."];
            let logIndex = 0;
            processingLog.innerHTML = "";
            const logInterval = setInterval(() => {
                if (logIndex < logs.length) {
                    const p = document.createElement("div");
                    p.innerText = logs[logIndex];
                    p.classList.add("fade-in");
                    processingLog.appendChild(p);
                    logIndex++;
                } else {
                    clearInterval(logInterval);
                    setTimeout(() => {
                        processingContainer.classList.add("hidden");
                        showResult();
                    }, 600);
                }
            }, 500); 
        }, 200);
    }

    function showResult() {
        resultContainer.classList.remove("hidden");
        resultContainer.classList.add("fade-in");
        let key = "";
        key += (scoreDim1 >= 0) ? "positive_" : "negative_";
        key += (scoreDim2 >= 0) ? "positive_" : "negative_";
        key += (scoreDim3 >= 0) ? "positive" : "negative";
        const finalOutcome = outcomes[key];
        document.getElementById("result-title").innerText = finalOutcome.title;
        document.getElementById("result-desc").innerText = finalOutcome.desc;
        startFireworks();
        setTimeout(() => {
            birthdayMsg.classList.add("show");
            saveBtn.classList.remove("hidden"); 
            bindCursorHover(); 
        }, 1000);
    }

    saveBtn.addEventListener('click', function() {
        triggerHaptic();
        const captureTarget = document.getElementById('result-container');
        this.classList.add('hidden');
        html2canvas(captureTarget, {
            backgroundColor: '#1f1e33', 
            scale: 2 
        }).then(canvas => {
            const link = document.createElement('a');
            link.download = '吴BTI测试结果.png';
            link.href = canvas.toDataURL('image/png');
            link.click();
            this.classList.remove('hidden');
        }).catch(err => {
            console.error("截图生成失败: ", err);
            this.classList.remove('hidden');
        });
    });

    function startFireworks() {
        const fCanvas = document.getElementById('fireworks-canvas');
        const ctx = fCanvas.getContext('2d');
        fCanvas.width = window.innerWidth;
        fCanvas.height = window.innerHeight;
        const particles = [];
        const colors = ['#e2e8f0', '#94a3b8', '#cbd5e1', '#fef3c7'];
        class Particle {
            constructor(x, y, color) {
                this.x = x; this.y = y; this.color = color;
                const angle = Math.random() * Math.PI * 2;
                const speed = Math.random() * 4 + 1.5;
                this.vx = Math.cos(angle) * speed;
                this.vy = Math.sin(angle) * speed;
                this.friction = 0.95; this.gravity = 0.04;
                this.alpha = 1; this.decay = Math.random() * 0.015 + 0.01;
            }
            update() {
                this.vx *= this.friction; this.vy *= this.friction;
                this.vy += this.gravity; this.x += this.vx; this.y += this.vy;
                this.alpha -= this.decay;
            }
            draw() {
                ctx.save(); ctx.globalAlpha = this.alpha;
                ctx.beginPath(); ctx.arc(this.x, this.y, 1.5, 0, Math.PI * 2);
                ctx.fillStyle = this.color; ctx.fill(); ctx.restore();
            }
        }
        function explode(x, y) {
            for (let i = 0; i < 50; i++) particles.push(new Particle(x, y, colors[Math.floor(Math.random() * colors.length)]));
        }
        function fAnimate() {
            requestAnimationFrame(fAnimate);
            ctx.clearRect(0, 0, fCanvas.width, fCanvas.height);
            if (Math.random() < 0.03) explode(Math.random() * fCanvas.width, fCanvas.height * Math.random() * 0.5);
            for (let i = particles.length - 1; i >= 0; i--) {
                const p = particles[i];
                p.update(); p.draw();
                if (p.alpha <= 0) particles.splice(i, 1);
            }
        }
        explode(fCanvas.width / 2, fCanvas.height / 3);
        setTimeout(() => explode(fCanvas.width * 0.3, fCanvas.height * 0.4), 600);
        setTimeout(() => explode(fCanvas.width * 0.7, fCanvas.height * 0.4), 1200);
        fAnimate();
    }
</script>
